# Netlify deploy config for the CD4 Target Discovery Portal (frontend/webserver).
# The static JSON API under /api/v1/* is generated by `npm run build`
# (scripts/build-static-api.mjs) into dist/ and served directly by the CDN.
#
# NOTE: if this site's Netlify UI already sets Base directory / Build command /
# Publish directory, values here take precedence for the keys below — reconcile
# with the existing deploy settings before merging this file.
[build]
  base = "frontend/webserver"
  command = "npm run build"
  publish = "dist"

# The app uses hash-based client routing, so no SPA history rewrite is strictly
# required; this defensive catch-all is harmless because Netlify serves existing
# static files (including everything under /api/v1/) before applying redirects.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
